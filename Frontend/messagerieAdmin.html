<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSA-AC Admin Dashboard (Messagerie)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="messagerieAdmin.css">
</head>

<body>

    <div class="sidebar">
        <div class="header-logo-container">
            <img src="assa-ac_LOGO.png" alt="Logo ASSA-AC" id="assaac-logo">
            <div class="logo-text">ASSA-AC</div>
        </div>
        <nav class="nav-menu">
            <a href="AccueilAdmin.html"><i class="fas fa-th-large"></i><span data-i18n="dashboard"> Tableau de Bord</span></a>
            <a href="gestioncompagnie.html"><i class="fas fa-building"></i><span data-i18n="manage_companies"> Gestion des Compagnies</span></a>
            <a href="factureAdmin.html"><i class="fas fa-file-invoice-dollar"></i><span data-i18n="invoicing"> Facturation</span></a>
            <a href="enregistrefacture.html" class="toggleAside"><i class="fas fa-file-circle-plus"></i><span data-i18n="create_invoice"> Créer une facture</span></a>
            <a href="messagerieAdmin.html" class="active"><i class="fas fa-comments"></i><span data-i18n="messaging"> Messagerie</span></a>
            <a href="ArchiveAdmin.html"><i class="fas fa-receipt"></i><span data-i18n="registry_operations"> Registre des opérations</span></a>
            <a href="journalActivité.html"><i class="fas fa-history"></i><span data-i18n="recent_activity"> Journal d'Activité</span></a>
            <a href="paramètreAdmin.html"><i class="fas fa-cog"></i><span data-i18n="settings"> Paramètres</span></a>
        </nav>
        <div class="sidebar-bottom">
            <a href="Index.html"><i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Déconnexion</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">

            <div class="header-left">
                <div class="search-bar">
                    <input id="searchInput" type="text" placeholder="Rechercher la compagnie..." data-i18n-placeholder="search_company">
                </div>
            </div>

            <div class="header-right">
                <div class="user-interaction-group">

                    <button class="icon-btn" title="Mode Sombre/Clair" id="theme-toggle">
                        <i class="fas fa-moon"></i></button>

                    <button class="icon-btn" title="Notifications"><i class="fas fa-bell"></i></button>
                    <button id="toggleLang" type="button" class="icon-btn" aria-pressed="false" title="Changer la langue"><i class="fas fa-language"></i><span id="langLabel" style="font-size: 12px; margin-left: 4px;">FR</span></button>
                    <div class="user-info">
                        <img src="Icône profile.png" alt="Avatar" class="user-avatar">
                    </div>
                </div>
            </div>
        </div>

        <main class="content-area">
            <div class="messaging-container">
                <div class="conversations-list">
                    <div class="list-header">
                        <span data-i18n="companies">Compagnies</span>
                    </div>
                    <div id="companyContainer" class="list-body"></div>
                </div>

                <div class="chat-area">
                    <div class="chat-header">
                        <img id="chat-company-avatar" src="assa-ac_LOGO.png" alt="Logo">
                        <div class="chat-header-details">
                            <h2 id="chat-company-name" data-i18n="select_company">Sélectionnez une compagnie</h2>
                            <p data-i18n="recent_messages">Messages récents</p>
                        </div>
                    </div>
                    <div class="chat-messages" id="chat-messages-content">
                        <p class="chat-placeholder" data-i18n="select_company_view">Sélectionnez une compagnie pour voir les messages ici.</p>
                    </div>
                    <div class="chat-input-area">
                        <textarea id="messageInput" rows="2" placeholder="Écrire un message..."></textarea>
                        <div class="input-actions">
                            <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                            <input type="file" id="attachmentInput" multiple style="display:none" />
                            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
    </div>

    <script src="langSwitch.js"></script>
    <script src="script.js"></script>
    <script src="theme.js"></script>
    <script src="messagerieAdmin.js"></script>

</body>

</html>
