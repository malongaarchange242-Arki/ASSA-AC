<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ASSA-AC DAF - Détail Facture</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="factureAdmin.css">
</head>
<body>
  <div class="sidebar">
    <div class="header-logo-container">
      <img src="assa-ac_LOGO.png" alt="Logo ASSA-AC" id="assaac-logo">
      <div class="logo-text">ASSA-AC</div>
    </div>
    <nav class="nav-menu">
      <a href="AccueilDAF.html"><i class="fas fa-th-large"></i> Tableau de Bord</a>
      <a href="validationFactures.html"><i class="fas fa-file-invoice-dollar"></i> Validation</a>
      <a href="factureDetailDAF.html" class="active"><i class="fas fa-file-invoice"></i> Détail</a>
      <a href="journalActivité.html"><i class="fas fa-history"></i> Journal d'Activité</a>
      <a href="paramètreAdmin.html"><i class="fas fa-cog"></i> Paramètres</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="Index.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </div>
  </div>

  <div class="main-content">
    <div class="header"></div>
    <div class="company-management">
      <div class="card">
        <h2>Détail facture</h2>
        <div id="facture-detail-root">Chargement...</div>
        <div style="margin-top:12px;">
          <button id="btn-validate" style="background:#16a34a;">Valider</button>
          <button id="btn-reject" style="background:#f97316;">Rejeter</button>
          <button id="btn-sign" style="background:#0ea5e9;">Signer</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const role = localStorage.getItem('userRole') || localStorage.getItem('role');
    if (role && !['Superviseur','DAF'].includes(role)) {
      alert('Accès réservé au DAF');
      window.location.href = 'Index.html';
    }
  </script>
  <script>
    // handlers will call backend endpoints: validate/reject/sign
    document.getElementById('btn-validate').addEventListener('click', async () => {
      alert('Valider - API call to be implemented');
    });
    document.getElementById('btn-reject').addEventListener('click', async () => {
      alert('Rejeter - API call to be implemented');
    });
    document.getElementById('btn-sign').addEventListener('click', async () => {
      alert('Signer - API call to be implemented');
    });
  </script>
</body>
</html>
